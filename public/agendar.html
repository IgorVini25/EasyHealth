<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EasyHealth | Agendar Consulta</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <script src="./js/script.js" defer></script>
  </head>
  <body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary mb-4">
      <div class="container">
        <a class="navbar-brand" href="index.html">🏥 EasyHealth</a>
        <div class="navbar-nav">
          <a class="nav-link" href="listagem-agendamentos.html">Ver Agenda</a>
        </div>
      </div>
    </nav>

    <div class="container">
      <div class="row justify-content-center">
        <div class="col-md-6">
          <div class="card shadow">
            <div class="card-header bg-white">
              <h4 class="mb-0">Novo Agendamento</h4>
            </div>
            <div class="card-body">
              <form id="formAgendamento">
                <div class="mb-3">
                  <label class="form-label">Paciente</label>
                  <select id="selectPaciente" class="form-select" required>
                    <option value="">Carregando pacientes...</option>
                  </select>
                </div>

                <div class="mb-3">
                  <label class="form-label">Médico</label>
                  <select id="selectMedico" class="form-select" required>
                    <option value="">Carregando médicos...</option>
                  </select>
                </div>

                <div class="row">
                  <div class="col-md-6 mb-3">
                    <label class="form-label">Data</label>
                    <input
                      type="date"
                      id="dataConsulta"
                      class="form-control"
                      required
                    />
                  </div>
                  <div class="col-md-6 mb-3">
                    <label class="form-label">Horário</label>
                    <input
                      type="time"
                      id="horaConsulta"
                      class="form-control"
                      required
                    />
                  </div>
                </div>

                <button type="submit" class="btn btn-primary w-100 mt-2">
                  Confirmar Agendamento
                </button>
                <a href="index.html" class="btn btn-link w-100 mt-2 text-muted"
                  >Cancelar</a
                >
              </form>
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
