<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <title>EasyHealth | Lista de Médicos</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <script src="./js/script.js" defer></script>
  </head>
  <body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary mb-4">
      <div class="container">
        <a class="navbar-brand" href="index.html">🏥 EasyHealth</a>
        <div class="navbar-nav">
          <a class="nav-link" href="cadastrar-medico.html">Novo Médico</a>
        </div>
      </div>
    </nav>

    <div class="container">
      <div class="card shadow">
        <div
          class="card-header bg-white d-flex justify-content-between align-items-center"
        >
          <h4 class="mb-0">Médicos Cadastrados</h4>
          <div class="d-flex gap-2">
            <select
              id="filtroEspecialidade"
              class="form-select form-select-sm"
              style="width: auto"
            >
              <option value="Todos">Todas as Especialidades</option>
              <option value="Cardiologia">Cardiologia</option>
              <option value="Dermatologia">Dermatologia</option>
              <option value="Ginecologia">Ginecologia</option>
              <option value="Neurologia">Neurologia</option>
              <option value="Ortopedia">Ortopedia</option>
              <option value="Pediatria">Pediatria</option>
              <option value="Psiquiatria">Psiquiatria</option>
              <option value="Urologia">Urologia</option>
            </select>
            <button
              onclick="carregarMedicos()"
              class="btn btn-sm btn-outline-primary"
            >
              🔄
            </button>
          </div>
        </div>
        <div class="card-body">
          <div class="table-responsive">
            <table class="table table-hover" id="tabelaMedicos">
              <thead class="table-light">
                <tr>
                  <th>Nome</th>
                  <th>CRM</th>
                  <th>Especialidade</th>
                  <th>Telefone</th>
                </tr>
              </thead>
              <tbody></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
