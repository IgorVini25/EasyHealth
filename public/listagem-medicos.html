<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <title>EasyHealth | Lista de Médicos</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css"
    />
    <script src="./js/script.js" defer></script>
    <style>
      .card,
      .btn,
      .form-control,
      .form-select,
      .navbar,
      .modal-content {
        border-radius: 0 !important;
      }
    </style>
  </head>
  <body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary mb-4">
      <div class="container">
        <a class="navbar-brand fw-bold" href="index.html">🏥 EasyHealth</a>
        <div class="navbar-nav">
          <a class="nav-link" href="cadastrar-medico.html">Novo Médico</a>
        </div>
      </div>
    </nav>

    <div class="container">
      <div class="card shadow border border-secondary-subtle">
        <div
          class="card-header bg-white d-flex justify-content-between align-items-center py-3"
        >
          <h4 class="mb-0 text-primary fw-bold">Médicos Cadastrados</h4>
          <div class="d-flex gap-2">
            <select
              id="filtroEspecialidade"
              class="form-select form-select-sm"
              style="width: auto"
            >
              <option value="Todos">Todas as Especialidades</option>
              <option value="Cardiologia">Cardiologia</option>
              <option value="Dermatologia">Dermatologia</option>
              <option value="Ginecologia">Ginecologia</option>
              <option value="Neurologia">Neurologia</option>
              <option value="Ortopedia">Ortopedia</option>
              <option value="Pediatria">Pediatria</option>
              <option value="Psiquiatria">Psiquiatria</option>
              <option value="Urologia">Urologia</option>
            </select>
            <button
              onclick="carregarMedicos()"
              class="btn btn-sm btn-outline-primary"
              title="Atualizar Lista"
            >
              <i class="bi bi-arrow-clockwise"></i>
            </button>
          </div>
        </div>
        <div class="card-body p-0">
          <div class="table-responsive">
            <table class="table table-hover mb-0" id="tabelaMedicos">
              <thead class="table-light">
                <tr>
                  <th class="ps-4">Nome</th>
                  <th>CRM</th>
                  <th>Especialidade</th>
                  <th>Telefone</th>
                  <th class="pe-4">Ações</th>
                </tr>
              </thead>
              <tbody></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>

    <!-- Modal Editar Médico -->
    <div class="modal fade" id="modalEditarMedico" tabindex="-1" aria-labelledby="modalEditarMedicoLabel" aria-hidden="true">
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header bg-primary text-white">
            <h5 class="modal-title fw-bold" id="modalEditarMedicoLabel"><i class="bi bi-pencil-square"></i> Editar Médico</h5>
            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <form id="formEditarMedico">
            <div class="modal-body">
              <input type="hidden" id="editMedicoId">
              <div class="mb-3">
                <label for="editNomeMedico" class="form-label fw-bold small">Nome</label>
                <input type="text" class="form-control" id="editNomeMedico" required>
              </div>
              <div class="mb-3">
                <label for="editCrmMedico" class="form-label fw-bold small">CRM</label>
                <input type="text" class="form-control" id="editCrmMedico" required>
              </div>
              <div class="mb-3">
                <label for="editEspecialidadeMedico" class="form-label fw-bold small">Especialidade</label>
                <select id="editEspecialidadeMedico" class="form-select" required>
                  <option value="Cardiologia">Cardiologia</option>
                  <option value="Dermatologia">Dermatologia</option>
                  <option value="Ginecologia">Ginecologia</option>
                  <option value="Neurologia">Neurologia</option>
                  <option value="Ortopedia">Ortopedia</option>
                  <option value="Pediatria">Pediatria</option>
                  <option value="Psiquiatria">Psiquiatria</option>
                  <option value="Urologia">Urologia</option>
                </select>
              </div>
              <div class="mb-3">
                <label for="editTelefoneMedico" class="form-label fw-bold small">Telefone</label>
                <input type="text" class="form-control" id="editTelefoneMedico" required>
              </div>
            </div>
            <div class="modal-footer">
              <button type="button" class="btn btn-outline-secondary btn-sm" data-bs-dismiss="modal">Cancelar</button>
              <button type="submit" class="btn btn-primary btn-sm">Salvar Alterações</button>
            </div>
          </form>
        </div>
      </div>
    </div>

    <!-- Bootstrap Bundle JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
