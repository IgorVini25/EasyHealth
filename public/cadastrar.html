<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <title>EasyHealth | Novo Paciente</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <script defer src="js/script.js"></script>
  </head>
  <body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary mb-4">
      <div class="container">
        <a class="navbar-brand" href="index.html">🏥 EasyHealth</a>
        <div class="navbar-nav">
          <a class="nav-link" href="listagem.html">Ver Lista</a>
        </div>
      </div>
    </nav>

    <div class="container">
      <div class="row justify-content-center">
        <div class="col-md-6">
          <div class="card shadow">
            <div class="card-header bg-white">
              <h4 class="mb-0">Cadastro de Paciente</h4>
            </div>
            <div class="card-body">
              <form id="formPaciente" autocomplete="off">
                <div class="mb-3">
                  <label class="form-label">Nome Completo</label>
                  <input
                    type="text"
                    id="nome"
                    class="form-control"
                    placeholder="Ex: Igor Diniz"
                    required
                  />
                </div>
                <div class="mb-3">
                  <label class="form-label">CPF</label>
                  <input
                    type="text"
                    id="cpf"
                    class="form-control"
                    maxlength="14"
                    placeholder="000.000.000-00"
                    required
                  />
                </div>
                <div class="mb-3">
                  <label class="form-label">Telefone</label>
                  <input
                    type="text"
                    id="telefone"
                    class="form-control"
                    maxlength="15"
                    placeholder="(00) 00000-0000"
                    required
                  />
                </div>
                <button type="submit" class="btn btn-success w-100">
                  Salvar Cadastro
                </button>
                <a href="index.html" class="btn btn-link w-100 mt-2 text-muted"
                  >Cancelar</a
                >
              </form>
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
