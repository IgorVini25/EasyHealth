<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <title>EasyHealth | Listagem</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <script defer src="js/script.js"></script>
  </head>
  <body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary mb-4">
      <div class="container">
        <a class="navbar-brand" href="index.html">🏥 EasyHealth</a>
        <div class="navbar-nav">
          <a class="nav-link" href="cadastrar.html">Novo Cadastro</a>
        </div>
      </div>
    </nav>

    <div class="container">
      <div class="card shadow">
        <div
          class="card-header bg-white d-flex justify-content-between align-items-center"
        >
          <h4 class="mb-0">Pacientes Cadastrados</h4>
          <button
            onclick="carregarPacientes()"
            class="btn btn-sm btn-outline-primary"
          >
            🔄 Atualizar Lista
          </button>
        </div>
        <div class="card-body">
          <div class="table-responsive">
            <table class="table table-hover" id="tabelaPacientes">
              <thead class="table-light">
                <tr>
                  <th>Nome</th>
                  <th>CPF</th>
                  <th>Telefone</th>
                </tr>
              </thead>
              <tbody></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
