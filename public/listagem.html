<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <title>EasyHealth | Listagem</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css"
    />
    <script defer src="js/script.js"></script>
    <style>
      .card,
      .btn,
      .form-control,
      .navbar,
      .modal-content {
        border-radius: 0 !important;
      }
    </style>
  </head>
  <body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary mb-4">
      <div class="container">
        <a class="navbar-brand fw-bold" href="index.html">🏥 EasyHealth</a>
        <div class="navbar-nav">
          <a class="nav-link" href="cadastrar.html">Novo Cadastro</a>
        </div>
      </div>
    </nav>

    <div class="container">
      <div class="card shadow border border-secondary-subtle">
        <div
          class="card-header bg-white d-flex justify-content-between align-items-center py-3"
        >
          <h4 class="mb-0 text-primary fw-bold">Pacientes Cadastrados</h4>
          <button
            onclick="carregarPacientes()"
            class="btn btn-sm btn-outline-primary"
          >
            <i class="bi bi-arrow-clockwise"></i> Atualizar Lista
          </button>
        </div>
        <div class="card-body p-0">
          <div class="table-responsive">
            <table class="table table-hover mb-0" id="tabelaPacientes">
              <thead class="table-light">
                <tr>
                  <th class="ps-4">Nome</th>
                  <th>CPF</th>
                  <th>Telefone</th>
                  <th class="pe-4">Ações</th>
                </tr>
              </thead>
              <tbody></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>

    <!-- Modal Editar Paciente -->
    <div class="modal fade" id="modalEditarPaciente" tabindex="-1" aria-labelledby="modalEditarPacienteLabel" aria-hidden="true">
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header bg-primary text-white">
            <h5 class="modal-title fw-bold" id="modalEditarPacienteLabel"><i class="bi bi-pencil-square"></i> Editar Paciente</h5>
            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <form id="formEditarPaciente">
            <div class="modal-body">
              <input type="hidden" id="editPacienteId">
              <div class="mb-3">
                <label for="editNomePaciente" class="form-label fw-bold small">Nome</label>
                <input type="text" class="form-control" id="editNomePaciente" required>
              </div>
              <div class="mb-3">
                <label for="editCpfPaciente" class="form-label fw-bold small">CPF</label>
                <input type="text" class="form-control" id="editCpfPaciente" required>
              </div>
              <div class="mb-3">
                <label for="editTelefonePaciente" class="form-label fw-bold small">Telefone</label>
                <input type="text" class="form-control" id="editTelefonePaciente" required>
              </div>
            </div>
            <div class="modal-footer">
              <button type="button" class="btn btn-outline-secondary btn-sm" data-bs-dismiss="modal">Cancelar</button>
              <button type="submit" class="btn btn-primary btn-sm">Salvar Alterações</button>
            </div>
          </form>
        </div>
      </div>
    </div>

    <!-- Bootstrap Bundle JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
