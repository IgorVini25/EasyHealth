<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EasyHealth | Agenda</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css"
    />
    <script src="./js/script.js" defer></script>
    <style>
      .card,
      .btn,
      .form-control,
      .form-select,
      .navbar,
      .modal-content {
        border-radius: 0 !important;
      }
      .header-agenda {
        background-color: #f8f9fa;
        border-bottom: 2px solid #dee2e6;
        padding: 20px 0;
        margin-bottom: 30px;
      }
    </style>
  </head>
  <body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary mb-0">
      <div class="container">
        <a class="navbar-brand fw-bold" href="index.html">🏥 EasyHealth</a>
        <div class="navbar-nav ms-auto">
          <a class="nav-link btn btn-primary border-0" href="agendar.html">
            <i class="bi bi-calendar-plus"></i> Novo Agendamento
          </a>
        </div>
      </div>
    </nav>

    <div class="header-agenda">
      <div class="container text-center">
        <h2 class="mb-0 fw-bold">Agenda de Consultas</h2>
        <p class="text-muted">Gerencie os horários e especialidades</p>
      </div>
    </div>

    <div class="container">
      <div class="card shadow-sm border border-secondary-subtle">
        <div
          class="card-header bg-white d-flex justify-content-between align-items-center py-3"
        >
          <h5 class="mb-0 text-primary fw-bold">Consultas Marcadas</h5>

          <div class="d-flex gap-2">
            <select
              id="filtroAgenda"
              class="form-select form-select-sm"
              style="width: 220px"
            >
              <option value="Todos">Todas as Especialidades</option>
              <option value="Cardiologia">Cardiologia</option>
              <option value="Dermatologia">Dermatologia</option>
              <option value="Ginecologia">Ginecologia</option>
              <option value="Neurologia">Neurologia</option>
              <option value="Ortopedia">Ortopedia</option>
              <option value="Pediatria">Pediatria</option>
              <option value="Psiquiatria">Psiquiatria</option>
              <option value="Urologia">Urologia</option>
            </select>
            <button
              onclick="carregarAgendamentos()"
              class="btn btn-sm btn-outline-primary"
              title="Atualizar Lista"
            >
              <i class="bi bi-arrow-clockwise"></i>
            </button>
          </div>
        </div>

        <div class="card-body p-0">
          <div class="table-responsive">
            <table class="table table-hover mb-0" id="tabelaAgendamentos">
              <thead class="table-light">
                <tr>
                  <th class="ps-4">Paciente</th>
                  <th>Médico Responsável</th>
                  <th>Especialidade</th>
                  <th>Data e Horário</th>
                  <th class="pe-4">Ações</th>
                </tr>
              </thead>
              <tbody>
                <tr>
                  <td colspan="5" class="text-center py-4 text-muted">
                    Buscando consultas na agenda...
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>

      <div class="mt-4 text-center">
        <a href="index.html" class="btn btn-outline-secondary btn-sm">
          <i class="bi bi-house"></i> Voltar ao Dashboard
        </a>
      </div>
    </div>

    <!-- Modal Editar Agendamento -->
    <div class="modal fade" id="modalEditarAgendamento" tabindex="-1" aria-labelledby="modalEditarAgendamentoLabel" aria-hidden="true">
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header bg-primary text-white">
            <h5 class="modal-title fw-bold" id="modalEditarAgendamentoLabel"><i class="bi bi-pencil-square"></i> Editar Agendamento</h5>
            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <form id="formEditarAgendamento">
            <div class="modal-body">
              <input type="hidden" id="editAgendamentoId">
              <div class="mb-3">
                <label for="editSelectPaciente" class="form-label fw-bold small">Paciente</label>
                <select id="editSelectPaciente" class="form-select" required></select>
              </div>
              <div class="mb-3">
                <label for="editSelectMedico" class="form-label fw-bold small">Médico</label>
                <select id="editSelectMedico" class="form-select" required></select>
              </div>
              <div class="mb-3">
                <label for="editDataConsulta" class="form-label fw-bold small">Data</label>
                <input type="date" class="form-control" id="editDataConsulta" required>
              </div>
              <div class="mb-3">
                <label for="editHoraConsulta" class="form-label fw-bold small">Horário</label>
                <input type="time" class="form-control" id="editHoraConsulta" required>
              </div>
              <div class="mb-3">
                <label for="editStatusConsulta" class="form-label fw-bold small">Status</label>
                <select id="editStatusConsulta" class="form-select" required>
                  <option value="Agendado">Agendado</option>
                  <option value="Realizado">Realizado</option>
                  <option value="Cancelado">Cancelado</option>
                </select>
              </div>
            </div>
            <div class="modal-footer">
              <button type="button" class="btn btn-outline-secondary btn-sm" data-bs-dismiss="modal">Cancelar</button>
              <button type="submit" class="btn btn-primary btn-sm">Salvar Alterações</button>
            </div>
          </form>
        </div>
      </div>
    </div>

    <!-- Bootstrap Bundle JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <footer class="text-center mt-5 py-4 text-muted small">
      EasyHealth &copy; 2026 | Sistema de Gestão AC3
    </footer>
  </body>
</html>
